<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타이타닉 생존 예측 시뮬레이터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: #0b1120; /* Deep dark background */
            color: #e2e8f0;
            background-image: 
                radial-gradient(at 0% 0%, hsla(196,100%,79%,0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(339,100%,79%,0.05) 0px, transparent 50%);
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #06b6d4;
            cursor: pointer;
            margin-top: -10px;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.6);
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: #334155;
            border-radius: 3px;
        }
        input[type=range]:focus { outline: none; }
        
        /* Circular Chart */
        .circular-chart {
            display: block;
            margin: 0 auto;
            max-width: 200px;
            max-height: 200px;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.3));
        }
        .circle-bg {
            fill: none;
            stroke: #334155;
            stroke-width: 2.5;
        }
        .circle {
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            transition: stroke-dasharray 1.5s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.5s ease;
        }
        .percentage {
            fill: #ffffff;
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 0.65em;
            text-anchor: middle;
        }
        
        /* Custom Buttons */
        .segment-btn {
            position: relative;
            overflow: hidden;
        }
        .segment-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: currentColor;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .segment-btn:hover::after { opacity: 0.05; }
        
        .segment-btn.active-cyan {
            background-color: rgba(6, 182, 212, 0.15);
            border-color: #06b6d4;
            color: #22d3ee;
            box-shadow: inset 0 0 10px rgba(6, 182, 212, 0.1);
        }
        .segment-btn.active-pink {
            background-color: rgba(244, 63, 94, 0.15);
            border-color: #f43f5e;
            color: #fb7185;
            box-shadow: inset 0 0 10px rgba(244, 63, 94, 0.1);
        }
        
        /* Result Badges */
        .bg-danger { background-color: rgba(244, 63, 94, 0.15); color: #fb7185; border: 1px solid rgba(244, 63, 94, 0.3); }
        .bg-warning { background-color: rgba(250, 204, 21, 0.15); color: #fde047; border: 1px solid rgba(250, 204, 21, 0.3); }
        .bg-success { background-color: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
        
        /* Loader */
        .loader {
            border: 3px solid rgba(255,255,255,0.2);
            border-top: 3px solid #fff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body class="min-h-screen p-4 flex justify-center items-center">

    <div class="glass-card max-w-4xl w-full rounded-2xl overflow-hidden flex flex-col md:flex-row">
        
        <!-- Left Panel: Input Controls -->
        <div class="w-full md:w-1/2 p-6 md:p-10 border-b md:border-b-0 md:border-r border-slate-700/50 flex flex-col justify-between">
            
            <div>
                <div class="mb-8 flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-cyan-500/20 flex items-center justify-center text-cyan-400">
                        <i class="fa-solid fa-ship"></i>
                    </div>
                    <div>
                        <h1 class="text-xl md:text-2xl font-bold text-white tracking-tight">타이타닉 생존 시뮬레이터</h1>
                        <p class="text-xs text-slate-400 mt-1">EDA 데이터 분석 기반 실시간 생존율 예측</p>
                    </div>
                </div>

                <!-- 1. PClass -->
                <div class="mb-8">
                    <label class="block text-sm font-medium text-slate-300 mb-3 flex justify-between items-center">
                        <span><i class="fa-solid fa-ticket text-slate-500 mr-2"></i>객실 등급</span>
                    </label>
                    <div class="grid grid-cols-3 gap-3">
                        <button class="segment-btn active-cyan border border-slate-600 rounded-xl py-3 text-sm font-medium transition" data-group="pclass" data-value="1">1등석</button>
                        <button class="segment-btn border border-slate-600 rounded-xl py-3 text-sm font-medium text-slate-400 hover:bg-slate-800 transition" data-group="pclass" data-value="2">2등석</button>
                        <button class="segment-btn border border-slate-600 rounded-xl py-3 text-sm font-medium text-slate-400 hover:bg-slate-800 transition" data-group="pclass" data-value="3">3등석</button>
                    </div>
                </div>

                <!-- 2. Gender -->
                <div class="mb-8">
                    <label class="block text-sm font-medium text-slate-300 mb-3 flex justify-between items-center">
                        <span><i class="fa-solid fa-person-half-dress text-slate-500 mr-2"></i>성별</span>
                    </label>
                    <div class="grid grid-cols-2 gap-3">
                        <button class="segment-btn active-pink border border-slate-600 rounded-xl py-3 text-sm font-medium transition flex items-center justify-center gap-2" data-group="gender" data-value="female">
                            <i class="fa-solid fa-venus text-rose-400"></i> 여성
                        </button>
                        <button class="segment-btn border border-slate-600 rounded-xl py-3 text-sm font-medium text-slate-400 hover:bg-slate-800 transition flex items-center justify-center gap-2" data-group="gender" data-value="male">
                            <i class="fa-solid fa-mars text-cyan-400"></i> 남성
                        </button>
                    </div>
                </div>

                <!-- 3. Age -->
                <div class="mb-10">
                    <div class="flex justify-between mb-4">
                        <label class="block text-sm font-medium text-slate-300">
                            <i class="fa-solid fa-cake-candles text-slate-500 mr-2"></i>나이 설정
                        </label>
                        <span id="ageDisplay" class="bg-cyan-500/20 text-cyan-300 px-3 py-1 rounded-full text-sm font-bold border border-cyan-500/30">28세</span>
                    </div>
                    <input type="range" id="ageSlider" min="0" max="80" value="28" class="w-full">
                    <div class="flex justify-between text-xs text-slate-500 mt-3 font-medium">
                        <span>0세 (영유아)</span>
                        <span>80세 (고령)</span>
                    </div>
                </div>
            </div>

            <!-- Calculate Button -->
            <button id="calcBtn" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 px-4 rounded-xl shadow-[0_0_20px_rgba(6,182,212,0.3)] transition-all active:scale-[0.98] flex justify-center items-center gap-2 mt-4">
                <span id="btnText">생존 확률 계산하기 <i class="fa-solid fa-wand-magic-sparkles ml-1"></i></span>
                <div id="btnLoader" class="loader"></div>
            </button>
        </div>

        <!-- Right Panel: Result Dashboard -->
        <div class="w-full md:w-1/2 p-6 md:p-10 bg-slate-900/50 flex flex-col items-center justify-center relative overflow-hidden">
            
            <!-- Background Decoration -->
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-cyan-500/5 rounded-full blur-3xl pointer-events-none"></div>

            <div class="w-full flex flex-col items-center justify-center z-10">
                <h2 class="text-xs font-bold text-slate-500 tracking-[0.2em] mb-8 uppercase">Prediction Result</h2>
                
                <!-- SVG Donut Chart -->
                <div class="w-full flex justify-center mb-8 relative">
                    <svg viewBox="0 0 36 36" class="circular-chart">
                        <path class="circle-bg"
                            d="M18 2.0845
                            a 15.9155 15.9155 0 0 1 0 31.831
                            a 15.9155 15.9155 0 0 1 0 -31.831"
                        />
                        <path id="progressCircle" class="circle"
                            stroke-dasharray="0, 100"
                            stroke="#f43f5e" 
                            d="M18 2.0845
                            a 15.9155 15.9155 0 0 1 0 31.831
                            a 15.9155 15.9155 0 0 1 0 -31.831"
                        />
                        <text x="18" y="20.8" id="percentageText" class="percentage">0.0%</text>
                    </svg>
                </div>

                <!-- Result Status Badge -->
                <div id="resultBadge" class="bg-danger px-5 py-2 rounded-full text-sm font-bold mb-6 flex items-center gap-2 opacity-0 transform translate-y-4 transition-all duration-500">
                    <i id="resultIcon" class="fa-solid fa-triangle-exclamation"></i>
                    <span id="resultBadgeText">결과 대기중</span>
                </div>

                <!-- Result Description -->
                <div id="resultDescBox" class="bg-slate-800/50 border border-slate-700/50 rounded-xl p-5 w-full max-w-sm opacity-0 transform translate-y-4 transition-all duration-500 delay-100">
                    <p id="resultDesc" class="text-center text-sm text-slate-300 leading-relaxed">
                        조건을 설정하고 계산하기 버튼을 눌러주세요.
                    </p>
                </div>
            </div>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // State Variables
            let state = {
                pclass: 1,
                gender: 'female',
                age: 28
            };

            // DOM Elements
            const pclassBtns = document.querySelectorAll('button[data-group="pclass"]');
            const genderBtns = document.querySelectorAll('button[data-group="gender"]');
            const ageSlider = document.getElementById('ageSlider');
            const ageDisplay = document.getElementById('ageDisplay');
            const calcBtn = document.getElementById('calcBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            
            // Result DOM
            const progressCircle = document.getElementById('progressCircle');
            const percentageText = document.getElementById('percentageText');
            const resultBadge = document.getElementById('resultBadge');
            const resultBadgeText = document.getElementById('resultBadgeText');
            const resultIcon = document.getElementById('resultIcon');
            const resultDescBox = document.getElementById('resultDescBox');
            const resultDesc = document.getElementById('resultDesc');

            // Button selection logic
            function updateButtons(group, value, activeColorClass) {
                const btns = document.querySelectorAll(`button[data-group="${group}"]`);
                btns.forEach(btn => {
                    if (btn.dataset.value === value.toString()) {
                        btn.classList.add(activeColorClass);
                        btn.classList.remove('text-slate-400', 'hover:bg-slate-800', 'border-slate-600');
                    } else {
                        btn.classList.remove(activeColorClass, 'active-cyan', 'active-pink');
                        btn.classList.add('text-slate-400', 'hover:bg-slate-800', 'border-slate-600');
                    }
                });
            }

            pclassBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    state.pclass = parseInt(e.currentTarget.dataset.value);
                    updateButtons('pclass', state.pclass, 'active-cyan');
                });
            });

            genderBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    state.gender = e.currentTarget.dataset.value;
                    const colorClass = state.gender === 'female' ? 'active-pink' : 'active-cyan';
                    updateButtons('gender', state.gender, colorClass);
                });
            });

            ageSlider.addEventListener('input', (e) => {
                state.age = parseInt(e.target.value);
                ageDisplay.textContent = `${state.age}세`;
            });

            // Algorithm based on Titanic EDA
            function calculateSurvivalProbability() {
                let prob = 0;
                let description = "";
                let status = ""; 

                if (state.gender === 'female') {
                    if (state.pclass === 1) { prob = 96.8; description = "1등실 여성 승객은 '여성과 아동 최우선 구출' 원칙에 따라 생존율이 가장 높습니다."; }
                    else if (state.pclass === 2) { prob = 92.1; description = "2등실 여성 승객은 대부분 구조선에 우선 탑승하여 높은 생존율을 보였습니다."; }
                    else if (state.pclass === 3) { prob = 50.0; description = "3등실 여성 승객은 1/2등실에 비해 객실 위치로 인해 구출이 늦어져 생존율이 절반 수준입니다."; }
                    
                    if (state.age <= 10) { prob = Math.min(99.0, prob + 5); }
                    else if (state.age >= 60) { prob = Math.max(10, prob - 10); description += " 다만 고령으로 인해 대피에 약간의 어려움이 예상됩니다."; }

                } else {
                    if (state.pclass === 1) { prob = 36.8; description = "1등실 남성 승객은 신분에 의해 일부 구출되었으나, 전체 생존율은 여성 대비 낮습니다."; }
                    else if (state.pclass === 2) { prob = 15.7; description = "2등실 남성 승객은 여성과 아동 양보 규칙으로 인해 구조율이 매우 저조합니다."; }
                    else if (state.pclass === 3) { prob = 13.5; description = `${state.pclass}등실 성인 남성 승객의 통계학적 예상 생존율은 극히 저조합니다.`; }

                    if (state.age <= 10) { 
                        prob = 55.0; 
                        description = "어린 남자아이(0~10세)는 '아동 우선 구출' 정책 덕분에 성인 남성에 비해 상대적으로 높은 생존율을 보였습니다."; 
                    }
                    else if (state.age >= 60) { prob = Math.max(5.0, prob - 5); }
                }

                // Add small jitter
                const jitter = (Math.random() * 2) - 1;
                prob = Math.max(1.1, Math.min(99.9, prob + jitter));

                if (prob < 30) { status = 'danger'; }
                else if (prob < 60) { status = 'warning'; }
                else { status = 'success'; }

                return {
                    probability: prob.toFixed(1),
                    description: description,
                    status: status
                };
            }

            calcBtn.addEventListener('click', () => {
                // UI Loading state
                btnText.style.display = 'none';
                btnLoader.style.display = 'block';
                
                // Hide results temporarily
                resultBadge.style.opacity = '0';
                resultBadge.style.transform = 'translateY(10px)';
                resultDescBox.style.opacity = '0';
                resultDescBox.style.transform = 'translateY(10px)';
                
                progressCircle.style.transition = 'none';
                progressCircle.setAttribute('stroke-dasharray', `0, 100`);
                percentageText.textContent = "계산중...";
                percentageText.style.opacity = '0.5';

                setTimeout(() => {
                    const result = calculateSurvivalProbability();
                    
                    // Restore Button
                    btnText.style.display = 'block';
                    btnLoader.style.display = 'none';
                    percentageText.style.opacity = '1';

                    // Update Badge Classes
                    resultBadge.className = 'px-5 py-2 rounded-full text-sm font-bold mb-6 flex items-center gap-2 transform transition-all duration-500 opacity-100 translate-y-0';
                    
                    let strokeColor = "";
                    if (result.status === 'danger') {
                        resultBadge.classList.add('bg-danger');
                        resultBadgeText.textContent = "사망 위험 그룹";
                        resultIcon.className = "fa-solid fa-triangle-exclamation";
                        strokeColor = "#f43f5e"; // Rose
                    } else if (result.status === 'warning') {
                        resultBadge.classList.add('bg-warning');
                        resultBadgeText.textContent = "생존 불확실";
                        resultIcon.className = "fa-solid fa-circle-exclamation";
                        strokeColor = "#facc15"; // Yellow
                    } else {
                        resultBadge.classList.add('bg-success');
                        resultBadgeText.textContent = "생존 유력 그룹";
                        resultIcon.className = "fa-solid fa-shield-check";
                        strokeColor = "#10b981"; // Emerald
                    }

                    // Animate Chart
                    progressCircle.style.transition = 'stroke-dasharray 1.5s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.5s ease';
                    progressCircle.setAttribute('stroke', strokeColor);
                    
                    // Small delay to ensure transition triggers
                    setTimeout(() => {
                        progressCircle.setAttribute('stroke-dasharray', `${result.probability}, 100`);
                    }, 50);
                    
                    // Counter animation
                    let start = 0;
                    const end = parseFloat(result.probability);
                    const duration = 1500;
                    const increment = end / (duration / 16); 
                    
                    const counter = setInterval(() => {
                        start += increment;
                        if (start >= end) {
                            start = end;
                            clearInterval(counter);
                            
                            // Show details after animation completes
                            resultDesc.innerHTML = `<span class="text-white font-semibold">분석 결과:</span><br/>${result.description}`;
                            resultDescBox.style.opacity = '1';
                            resultDescBox.style.transform = 'translateY(0)';
                        }
                        percentageText.textContent = start.toFixed(1) + "%";
                    }, 16);

                }, 600); // Fake processing delay
            });

            // Auto-calculate on load
            setTimeout(() => calcBtn.click(), 300);
        });
    </script>
</body>
</html>
